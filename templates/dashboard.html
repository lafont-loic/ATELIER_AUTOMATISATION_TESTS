<!DOCTYPE html>
<html>
<head>
    <title>Monitoring API RATP</title>
    <style>
        table { border-collapse: collapse; width: 100%; font-family: sans-serif; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .valid { color: green; font-weight: bold; }
        .invalid { color: red; font-weight: bold; }
        .latency-warning { color: orange; }
    </style>
</head>
<body>
    <h1>Rapport de Santé API (QoS & Contrat)</h1>
    <table>
        <thead>
            <tr>
                <th>Date / Heure</th>
                <th>Status HTTP</th>
                <th>Latence (ms)</th>
                <th>Contrat Valide ?</th>
                <th>Message d'erreur / Logs</th>
            </tr>
        </thead>
        <tbody>
            {% for run in runs %}
            <tr>
                <td>{{ run[0] }}</td>
                <td>{{ run[1] }}</td>
                <td class="{{ 'latency-warning' if run[2] > 3000 else '' }}">
                    {{ run[2]|round|int }} ms
                </td>
                <td class="{{ 'valid' if run[3] else 'invalid' }}">
                    {{ "OUI" if run[3] else "NON" }}
                </td>
                <td><small>{{ run[4] if run[4] else "Aucune erreur" }}</small></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
